apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "iris.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iris.labels" . | nindent 4 }}
{{- with .Values.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
{{- end }}
---
# The rules are synced from the generated config/rbac/role.yaml by
# `make manifests` (see chart/iris/rbac/role.yaml), keeping the markers the
# single source of truth.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "iris.fullname" . }}-manager
  labels:
    {{- include "iris.labels" . | nindent 4 }}
rules:
  {{- (.Files.Get "rbac/role.yaml" | fromYaml).rules | toYaml | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "iris.fullname" . }}-manager
  labels:
    {{- include "iris.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "iris.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "iris.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
