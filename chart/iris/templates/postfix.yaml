{{/*
The Postfix maps ConfigMap is created empty and owned by the chart. The
controller renders the routing maps into it from the Relay resources. The
helm.sh/resource-policy keep annotation stops Helm from deleting the
controller-managed content on upgrade.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "iris.postfixMapsConfigMap" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iris.labels" . | nindent 4 }}
    app.kubernetes.io/component: postfix
  annotations:
    helm.sh/resource-policy: keep
data:
  transport: ""
  relay_domains: ""
  relay_recipient_maps: ""
{{- if and .Values.postfix.tls.enabled .Values.postfix.tls.certManager.enabled }}
{{- if not .Values.postfix.tls.certManager.issuerRef }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "iris.fullname" . }}-postfix-selfsigned
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iris.labels" . | nindent 4 }}
    app.kubernetes.io/component: postfix
spec:
  selfSigned: {}
{{- end }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "iris.fullname" . }}-postfix
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iris.labels" . | nindent 4 }}
    app.kubernetes.io/component: postfix
spec:
  secretName: {{ include "iris.postfixTLSSecret" . }}
  dnsNames:
    {{- if .Values.postfix.tls.certManager.issuerRef }}
    {{- if not .Values.postfix.tls.dnsNames }}
    {{- fail "postfix.tls.dnsNames must list the public MX hostname(s) when postfix.tls.certManager.issuerRef references an external (e.g. ACME) issuer, which cannot validate in-cluster .svc names." }}
    {{- end }}
    {{- else }}
    {{- /* Self-signed issuer: the in-cluster Service name is sufficient for opportunistic STARTTLS. */}}
    - {{ include "iris.fullname" . }}-postfix.{{ .Release.Namespace }}.svc
    - {{ include "iris.fullname" . }}-postfix.{{ .Release.Namespace }}.svc.cluster.local
    {{- end }}
    {{- range .Values.postfix.tls.dnsNames }}
    - {{ . | quote }}
    {{- end }}
  issuerRef:
    {{- if .Values.postfix.tls.certManager.issuerRef }}
    {{- toYaml .Values.postfix.tls.certManager.issuerRef | nindent 4 }}
    {{- else }}
    name: {{ include "iris.fullname" . }}-postfix-selfsigned
    kind: Issuer
    {{- end }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iris.fullname" . }}-postfix
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iris.labels" . | nindent 4 }}
    app.kubernetes.io/component: postfix
spec:
  replicas: {{ .Values.postfix.replicas }}
  selector:
    matchLabels:
      {{- include "iris.postfix.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "iris.postfix.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postfix
          image: {{ include "iris.postfix.image" . }}
          imagePullPolicy: {{ .Values.postfix.image.pullPolicy }}
          env:
            # boky/postfix refuses to start without a sender-domain policy. Iris
            # gates senders in the relay data plane, not at the ingress, so allow
            # an empty list here and accept inbound mail via the routing maps.
            - name: ALLOW_EMPTY_SENDER_DOMAINS
              value: "true"
            - name: IRIS_RELOADER_SOURCE_PATH
              value: /etc/postfix/maps-src
            - name: IRIS_RELOADER_WORK_PATH
              value: /etc/postfix/maps
            - name: IRIS_RELOADER_ADMIN_ADDR
              value: ":8080"
            {{- if .Values.postfix.tls.enabled }}
            - name: IRIS_POSTFIX_TLS_DIR
              value: /etc/postfix/tls
            {{- end }}
            {{- include "iris.sentryEnv" . | nindent 12 }}
          ports:
            - name: smtp
              containerPort: {{ .Values.exposure.ports.smtp }}
            - name: submission
              containerPort: {{ .Values.exposure.ports.submission }}
            - name: smtps
              containerPort: {{ .Values.exposure.ports.smtps }}
            - name: metrics
              containerPort: 8080
          resources:
            {{- toYaml .Values.postfix.resources | nindent 12 }}
          volumeMounts:
            - name: maps-src
              mountPath: /etc/postfix/maps-src
              readOnly: true
            - name: maps-work
              mountPath: /etc/postfix/maps
            {{- if .Values.postfix.tls.enabled }}
            - name: tls
              mountPath: /etc/postfix/tls
              readOnly: true
            {{- end }}
      volumes:
        - name: maps-src
          configMap:
            name: {{ include "iris.postfixMapsConfigMap" . }}
        # maps-work is the writable copy Postfix compiles and reads, since the
        # ConfigMap mount above is read-only and postmap must write a database.
        - name: maps-work
          emptyDir: {}
        {{- if .Values.postfix.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ include "iris.postfixTLSSecret" . }}
        {{- end }}
{{- if .Values.exposure.service.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "iris.fullname" . }}-postfix
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "iris.labels" . | nindent 4 }}
    app.kubernetes.io/component: postfix
  {{- with .Values.exposure.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.exposure.service.type }}
  {{- with .Values.exposure.service.clusterIP }}
  clusterIP: {{ . | quote }}
  {{- end }}
  {{- if eq .Values.exposure.service.type "LoadBalancer" }}
  {{- with .Values.exposure.service.loadBalancerIP }}
  loadBalancerIP: {{ . | quote }}
  {{- end }}
  {{- end }}
  selector:
    {{- include "iris.postfix.selectorLabels" . | nindent 4 }}
  ports:
    - name: smtp
      port: {{ .Values.exposure.ports.smtp }}
      targetPort: smtp
      protocol: TCP
      {{- if and (eq .Values.exposure.service.type "NodePort") .Values.exposure.service.nodePorts.smtp }}
      nodePort: {{ .Values.exposure.service.nodePorts.smtp }}
      {{- end }}
    - name: submission
      port: {{ .Values.exposure.ports.submission }}
      targetPort: submission
      protocol: TCP
      {{- if and (eq .Values.exposure.service.type "NodePort") .Values.exposure.service.nodePorts.submission }}
      nodePort: {{ .Values.exposure.service.nodePorts.submission }}
      {{- end }}
    - name: smtps
      port: {{ .Values.exposure.ports.smtps }}
      targetPort: smtps
      protocol: TCP
      {{- if and (eq .Values.exposure.service.type "NodePort") .Values.exposure.service.nodePorts.smtps }}
      nodePort: {{ .Values.exposure.service.nodePorts.smtps }}
      {{- end }}
{{- end }}
