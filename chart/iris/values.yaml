# Default values for the iris chart.

nameOverride: ""
fullnameOverride: ""

# imagePullSecrets are applied to every pod in the chart.
imagePullSecrets: []

controller:
  replicas: 2
  image:
    repository: ghcr.io/philprime/iris-controller
    # tag defaults to the chart appVersion when empty.
    tag: ""
    pullPolicy: IfNotPresent
  # leaderElection keeps a single active reconciler across replicas.
  leaderElection: true
  # relayImage is the image the controller reconciles for each Relay's pod.
  relayImage:
    repository: ghcr.io/philprime/iris-relay
    tag: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

postfix:
  replicas: 2
  image:
    repository: ghcr.io/philprime/iris-postfix
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # tls provisions a serving certificate for opportunistic STARTTLS on the
  # public SMTP listeners (25/587/465). When disabled, Postfix serves
  # plaintext only.
  tls:
    enabled: false
    # dnsNames are extra certificate SANs (the public MX hostname). The
    # in-cluster Postfix Service DNS name is always included. For opportunistic
    # STARTTLS senders do not verify the certificate, so a self-signed
    # certificate over the Service name is sufficient.
    dnsNames: []
    # secretName overrides the TLS secret name. Defaults to
    # <fullname>-postfix-tls.
    secretName: ""
    # certManager provisions the serving certificate. When disabled, supply the
    # secret named above another way (it must hold tls.crt and tls.key).
    certManager:
      enabled: true
      # issuerRef references an existing Issuer/ClusterIssuer. When empty a
      # self-signed Issuer is created in the release namespace.
      issuerRef: {}

# exposure controls how the Postfix ingress is published.
exposure:
  service:
    # enabled toggles whether the chart renders the Postfix Service. Set it to
    # false to wire your own front Service to the Postfix pods.
    enabled: true
    # type is the Kubernetes Service type for the ingress: ClusterIP, NodePort,
    # or LoadBalancer. Use LoadBalancer (the default) on clouds that provision
    # one for a stable public IP. Use NodePort when an external load balancer
    # forwards the SMTP ports to fixed node ports (e.g. a bare-metal /
    # dedicated-server cluster). Use ClusterIP when external L4 infrastructure
    # targets the in-cluster Service.
    type: LoadBalancer
    annotations: {}
    # clusterIP pins the cluster-internal IP. Leave empty to let Kubernetes
    # allocate one. Set to "None" for a headless Service.
    clusterIP: ""
    # loadBalancerIP pins a stable public IP for MX records when supported.
    # Only applied when type is LoadBalancer.
    loadBalancerIP: ""
    # nodePorts pins the host ports when type is NodePort (must be within the
    # cluster's node-port range, typically 30000-32767). Leave a value empty to
    # let Kubernetes allocate one.
    nodePorts:
      smtp: ""
      submission: ""
      smtps: ""
  # ports are the SMTP listener ports, shared by the Service and the Postfix
  # container.
  ports:
    smtp: 25
    submission: 587
    smtps: 465

webhook:
  enabled: true
  port: 9443
  # certManager provisions the serving certificate. When disabled, supply the
  # certificate another way and set caBundle on the webhook configuration.
  certManager:
    enabled: true
    # issuerRef references an existing Issuer/ClusterIssuer. When empty a
    # self-signed Issuer is created in the release namespace.
    issuerRef: {}

metrics:
  # serviceMonitor requires the Prometheus operator CRDs.
  serviceMonitor:
    enabled: false
    interval: 30s
  # networkPolicy restricts scrape access to the monitoring namespace.
  networkPolicy:
    enabled: false
    monitoringNamespace: monitoring

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# sentry is injected as IRIS_SENTRY_* env on every component (opt-in).
sentry:
  enabled: false
  dsn: ""
  environment: production
