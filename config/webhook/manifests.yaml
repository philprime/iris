---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: webhook-service
        namespace: system
        path: /validate-iris-philprime-dev-v1alpha1-relay
    failurePolicy: Fail
    name: vrelay.iris.philprime.dev
    rules:
      - apiGroups:
          - iris.philprime.dev
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - relays
    sideEffects: None
