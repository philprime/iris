name: analyze

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: analyze-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: make analyze
        run: make analyze
