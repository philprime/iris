name: format

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: format-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install dprint
        run: |
          curl -fsSL https://dprint.dev/install.sh | sh -s > /dev/null
          echo "$HOME/.dprint/bin" >> "$GITHUB_PATH"
      - name: make format
        run: make format
      - name: Verify formatting is committed
        run: git diff --exit-code
